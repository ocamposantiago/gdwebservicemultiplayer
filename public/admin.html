<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godot Server Admin</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .panel {
            background: #2a2a2a;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { color: #f5f5f5; margin-top: 0; }
        .info {
            background: #333;
            padding: 1rem;
            border-radius: 6px;
            margin: 1rem 0;
            font-size: 1.2rem;
        }
        button {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #b71c1c; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="panel">
        <h1>Server Admin</h1>
        <div class="info">
            Next Player ID assignment: <strong id="nextIdDisplay" style="color:#00e676">Loading...</strong>
        </div>
        <button onclick="resetCounter()">Reset Player Counter to 1</button>
        <p id="msg" style="color: #4CAF50; margin-top: 1rem; height: 1rem;"></p>
    </div>

    <script>
        function checkStatus() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('nextIdDisplay').textContent = data.nextPlayerId;
                });
        }

        function resetCounter() {
            fetch('/api/reset', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    document.getElementById('nextIdDisplay').textContent = data.nextPlayerId;
                    const msg = document.getElementById('msg');
                    msg.textContent = "Counter has been reset!";
                    setTimeout(() => msg.textContent = "", 2000);
                });
        }

        // Initial check
        checkStatus();
        // Poll every 2s
        setInterval(checkStatus, 2000);
    </script>
</body>
</html>
