<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Godot Mobile Sensor Client</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            overflow: hidden;
        }

        .container {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            width: 350px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #00e676;
        }

        .status {
            margin: 1rem 0;
            padding: 1rem;
            border-radius: 8px;
            background: #2c2c2c;
            font-size: 0.9rem;
            color: #b0bec5;
            word-break: break-all;
        }

        .connected { border-left: 4px solid #00e676; }
        .disconnected { border-left: 4px solid #ff1744; }

        button {
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, box-shadow 0.2s;
            margin-bottom: 1rem;
        }

        #connectBtn {
            background: linear-gradient(135deg, #00e676 0%, #00c853 100%);
            color: #000;
        }

        #resetBtn {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            color: white;
        }

        #spawnBtn {
            background: #00e676;
            color: #000;
            font-size: 2rem;
            width: 160px;
            height: 160px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 230, 118, 0.4);
            margin: 2rem auto;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        button:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
        }

        .data-display {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 2rem;
        }

        .data-box {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .bar-container {
            height: 100px;
            width: 24px;
            background: #444;
            margin: 10px auto;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
        .bar-center {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-50%);
            z-index: 2;
        }
        .bar {
            position: absolute;
            left: 0;
            width: 100%;
            background: #00e676;
            transition: height 0.1s, bottom 0.1s, top 0.1s;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="setupSection">
            <h1 id="setupTitle">REGISTRATE PARA JUGAR</h1>
            <input type="text" id="playerNameInput" placeholder="Nombre" style="width: 100%; padding: 1rem; margin-bottom: 1rem; border-radius: 8px; border: none; font-size: 1.1rem; box-sizing: border-box; text-align: center; background: #2c2c2c; color: white;">
            <input type="email" id="playerMailInput" placeholder="Correo electrónico" style="width: 100%; padding: 1rem; margin-bottom: 1rem; border-radius: 8px; border: none; font-size: 1.1rem; box-sizing: border-box; text-align: center; background: #2c2c2c; color: white;">
            <button id="continueBtn" style="background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%); color: white;">Continuar</button>
        </div>

        <div id="gameSection" style="display: none;">
            <h1 id="gameTitle">CONECTATE Y JUGA</h1>
            <button id="connectBtn">Conectar</button>
            <button id="resetBtn" style="display: none;">Reset Baseline</button>
            <button id="spawnBtn" style="display: none;">DISPARA</button>
            
            <div id="status" class="status disconnected">Desconectado</div>

            <div class="data-display">
                <div class="data-box">
                    <div>Pitch</div>
                    <div class="bar-container">
                        <div id="barX" class="bar"></div>
                        <div class="bar-center"></div>
                    </div>
                </div>
                <div class="data-box">
                    <div>Yaw</div>
                    <div class="bar-container">
                        <div id="barY" class="bar"></div>
                        <div class="bar-center"></div>
                    </div>
                </div>
                <div class="data-box">
                    <div>Roll</div>
                    <div class="bar-container">
                        <div id="barZ" class="bar"></div>
                        <div class="bar-center"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const connectBtn = document.getElementById('connectBtn');
        const resetBtn = document.getElementById('resetBtn');
        const spawnBtn = document.getElementById('spawnBtn');
        const setupSection = document.getElementById('setupSection');
        const gameSection = document.getElementById('gameSection');
        const playerNameInput = document.getElementById('playerNameInput');
        const playerMailInput = document.getElementById('playerMailInput');
        const continueBtn = document.getElementById('continueBtn');
        const gameTitle = document.getElementById('gameTitle');

        let ws = null;
        let isStreaming = false;
        let myPlayerId = 1; // Default to 1
        let playerName = "Player";
        let playerMail = "";
        
        continueBtn.addEventListener('click', () => {
            const nameVal = playerNameInput.value.trim();
            const mailVal = playerMailInput.value.trim();
            if (nameVal !== '' && mailVal !== '') {
                playerName = nameVal;
                playerMail = mailVal;
                setupSection.style.display = 'none';
                gameSection.style.display = 'block';
            } else {
                alert('Por favor completa ambos campos.');
            }
        });

        let basePitch = 0, baseYaw = 0, baseRoll = 0;
        let currentPitch = 0, currentYaw = 0, currentRoll = 0;
        let lastSendTime = 0;

        function updateStatus(msg, isConnected = false) {
            statusEl.textContent = msg;
            if (isConnected) {
                statusEl.classList.add('connected');
                statusEl.classList.remove('disconnected');
                connectBtn.style.display = 'none'; // Hide connect button once active to make room
                resetBtn.style.display = 'none';
                spawnBtn.style.display = 'flex';
                gameTitle.textContent = playerName;
            } else {
                statusEl.classList.add('disconnected');
                statusEl.classList.remove('connected');
                connectBtn.style.display = 'block';
                connectBtn.textContent = 'Conectar';
                resetBtn.style.display = 'none';
                spawnBtn.style.display = 'none';
                gameTitle.textContent = 'CONECTATE Y JUGA';
                document.body.style.backgroundColor = '#121212';
            }
        }

        function updateBar(barId, value) {
            const bar = document.getElementById(barId);
            if (!bar) return;
            let height = Math.abs(value) * 50;
            if (value >= 0) {
                bar.style.bottom = '50%';
                bar.style.top = 'auto';
            } else {
                bar.style.top = '50%';
                bar.style.bottom = 'auto';
            }
            bar.style.height = `${height}%`;
        }

        function connectWebSocket() {
            // Use WSS (Secure WebSocket) or WS based on how the page was loaded
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}`;
            updateStatus(`Connecting to ${wsUrl}...`);

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    updateStatus(`Connected to Godot Server`, true);
                    isStreaming = true;
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === "assign_id") {
                            myPlayerId = data.id;
                            updateStatus(`Connected as ${playerName} (Player ${myPlayerId})`, true);
                            
                            // Determine player color based on ID
                            let playerColor;
                            if (myPlayerId === 1) {
                                playerColor = '#ff003c'; // Bright Saturated Red
                                document.body.style.backgroundColor = playerColor;
                                document.querySelector('.container').style.backgroundColor = '#cc0030';
                            } else if (myPlayerId === 2) {
                                playerColor = '#0066ff'; // Bright Saturated Blue
                                document.body.style.backgroundColor = playerColor;
                                document.querySelector('.container').style.backgroundColor = '#004bcc';
                            } else {
                                playerColor = '#ffcc00'; // Bright Saturated Yellow
                                document.body.style.backgroundColor = playerColor;
                                document.querySelector('.container').style.backgroundColor = '#ccaa00';
                            }
                            
                            // Send name + color to server
                            ws.send(JSON.stringify({
                                address: "/name",
                                args: [myPlayerId, playerName, playerColor]
                            }));
                            
                            // Trigger connection haptic
                            if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
                        }
                    } catch (e) {
                        console.log("Ignored non-json message from server");
                    }
                };

                ws.onclose = () => {
                    updateStatus('Disconnected', false);
                    isStreaming = false;
                    ws = null;
                };

                ws.onerror = (err) => {
                    console.error("WS Error", err);
                    updateStatus('WebSocket Connection Error', false);
                };

            } catch (e) {
                console.error("Failed to construct WebSocket", e);
                updateStatus('Failed to construct WebSocket', false);
            }
        }

        function disconnectWebSocket() {
            if (ws) {
                ws.close();
            }
            isStreaming = false;
            updateStatus('Disconnected', false);
        }

        // iOS requires explicit permission to access sensors, triggered by user interaction
        function requestSensorPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            connectWebSocket();
                        } else {
                            updateStatus('Sensor permission denied');
                        }
                    })
                    .catch(console.error);
            } else {
                // Non-iOS 13+ devices
                window.addEventListener('deviceorientation', handleOrientation);
                connectWebSocket();
            }
        }

        function handleOrientation(event) {
            currentPitch = (event.beta || 0) * (Math.PI / 180);
            currentRoll = (event.gamma || 0) * (Math.PI / 180);
            currentYaw = (event.alpha || 0) * (Math.PI / 180);

            // Calculate relative angles (in radians, roughly -PI to PI)
            let pitch = currentPitch - basePitch;
            let roll = currentRoll - baseRoll;
            
            // Handle wrap-around for yaw (alpha) which is 0-360 degrees (0-2PI)
            // We need the shortest angular difference between currentYaw and baseYaw
            let yaw = currentYaw - baseYaw;
            yaw = Math.atan2(Math.sin(yaw), Math.cos(yaw));

            // Normalize between -1 and 1
            // Most natural hand movements stay within +/- 45 degrees (PI/4 ~ 0.785 rad). 
            // We use 1.0 rad (approx 57 degrees) as our max comfortable range for "1.0" output
            const MAX_RESTING_ANGLE = 1.0; 

            pitch = Math.max(-1.0, Math.min(1.0, pitch / MAX_RESTING_ANGLE));
            yaw = Math.max(-1.0, Math.min(1.0, yaw / MAX_RESTING_ANGLE));
            roll = Math.max(-1.0, Math.min(1.0, roll / MAX_RESTING_ANGLE));

            // Update UI
            updateBar('barX', pitch);
            updateBar('barY', yaw);
            updateBar('barZ', roll);

            // Throttle to 30fps (approx 33.3ms)
            const now = Date.now();
            if (now - lastSendTime >= 33) {
                if (isStreaming && ws && ws.readyState === WebSocket.OPEN) {
                    const payload = JSON.stringify({
                        address: "/gyro",
                        args: [myPlayerId, pitch, yaw, roll]
                    });
                    ws.send(payload);
                    lastSendTime = now;
                }
            }
        }

        spawnBtn.addEventListener('pointerdown', (e) => {
            e.preventDefault(); // Prevents simulated mouse events like 'click' from firing later
            if (isStreaming && ws && ws.readyState === WebSocket.OPEN) {
                const payload = JSON.stringify({
                    address: "/action",
                    args: [myPlayerId, "spawn_sphere"]
                });
                ws.send(payload);
                
                // Short vibration on tap
                if (navigator.vibrate) navigator.vibrate(30);
                
                // Add a little tap feedback
                const oldColor = spawnBtn.style.background;
                spawnBtn.style.background = "#00c853";
                spawnBtn.style.transform = "scale(0.95)";
                
                setTimeout(() => {
                    spawnBtn.style.background = "";
                    spawnBtn.style.transform = "none";
                }, 100);
            }
        });

        resetBtn.addEventListener('click', () => {
            if (navigator.vibrate) navigator.vibrate([20, 30, 20]);
            basePitch = currentPitch;
            baseYaw = currentYaw;
            baseRoll = currentRoll;
            updateStatus('Gyro baseline reset!', true);
        });

        connectBtn.addEventListener('click', () => {
            if (isStreaming) {
                disconnectWebSocket();
                window.removeEventListener('deviceorientation', handleOrientation);
            } else {
                requestSensorPermission();
            }
        });

    </script>
</body>
</html>
